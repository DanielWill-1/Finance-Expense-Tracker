services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - ghostledger-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=/app/data/ghostledger.db
    restart: unless-stopped

volumes:
  ghostledger-data:
